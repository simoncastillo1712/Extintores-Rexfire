{% extends 'base.html' %}
{% block contenido %}

<div class="row justify-content-center mt-2 mb-5">
    <div class="col-md-7 col-lg-6">
        <div class="card shadow-sm p-4">

            <div class="text-center mb-4">
                <i class="bi bi-person-plus-fill text-primary" style="font-size:2.8rem;"></i>
                <h3 class="fw-bold mt-2 mb-0">Crear cuenta</h3>
                <p class="text-muted" style="font-size:0.9rem;">Completa tus datos para finalizar la compra</p>
            </div>

            <form method="POST">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ next }}">

                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        {{ field.label }}
                        {% if field.field.required %}<span class="text-danger">*</span>{% endif %}
                    </label>
                    {{ field }}
                    {% if field.errors %}
                    <div class="text-danger" style="font-size:0.85rem;">{{ field.errors }}</div>
                    {% endif %}
                </div>
                {% endfor %}

                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary py-2 fw-semibold">
                        <i class="bi bi-person-check-fill"></i> Registrarme y continuar
                    </button>
                </div>
            </form>

            <hr class="my-3">

            <p class="text-center text-muted mb-0" style="font-size:0.88rem;">
                ¿Ya tienes cuenta?
                <a href="{% url 'cliente_login' %}?next={{ next }}" class="fw-semibold">
                    Ingresa con tu RUT
                </a>
            </p>

        </div>

        <div class="text-center mt-3">
            <a href="{% url 'ver_carrito' %}" class="text-muted" style="font-size:0.85rem;">
                <i class="bi bi-arrow-left"></i> Volver al carrito
            </a>
        </div>
    </div>
</div>

{% endblock %}
