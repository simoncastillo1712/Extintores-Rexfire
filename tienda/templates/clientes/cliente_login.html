{% extends 'base.html' %}
{% block contenido %}

<div class="row justify-content-center mt-2 mb-5">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-sm p-4">

            <div class="text-center mb-4">
                <i class="bi bi-person-circle text-primary" style="font-size:2.8rem;"></i>
                <h3 class="fw-bold mt-2 mb-0">Identificación</h3>
                <p class="text-muted" style="font-size:0.9rem;">Ingresa tu RUT para continuar con tu compra</p>
            </div>

            {% if error %}
            <div class="alert alert-danger py-2">{{ error }}</div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ next }}">
                <div class="mb-3">
                    <label class="form-label fw-semibold">RUT</label>
                    <input type="text" name="rut" class="form-control form-control-lg text-center"
                           placeholder="12.345.678-9" autofocus required>
                    <div class="form-text">Ingresa tu RUT sin puntos ni guión, o con formato 12.345.678-9</div>
                </div>
                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary py-2 fw-semibold">
                        <i class="bi bi-arrow-right-circle"></i> Continuar
                    </button>
                </div>
            </form>

            <hr class="my-3">

            <p class="text-center text-muted mb-0" style="font-size:0.88rem;">
                ¿Primera vez?
                <a href="{% url 'cliente_registro' %}?next={{ next }}" class="fw-semibold">
                    Crea tu cuenta aquí
                </a>
            </p>

        </div>

        <div class="text-center mt-3">
            <a href="{% url 'ver_carrito' %}" class="text-muted" style="font-size:0.85rem;">
                <i class="bi bi-arrow-left"></i> Volver al carrito
            </a>
        </div>
    </div>
</div>

{% endblock %}
